<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AMT 题库练习</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --ink:#2d3b45; --muted:#6b7280; --border:#e5e7eb; --bg:#f9fafb;
      --brand:#2563eb; --success:#047857; --danger:#b91c1c; --card:#fff;
      --hover:#f3f4f6; --selected-bg:#f0f5ff;
    }
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;color:var(--ink);background:var(--bg);max-width:900px;margin:20px auto;line-height:1.6;padding:0 10px}
    h1{font-size:1.4rem;margin:0 0 10px}

    .btn{padding:8px 12px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:14px;color:inherit}
    .btn:hover{background:var(--hover)}
    .btn-sm{padding:4px 8px;font-size:12px}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .submit-btn{background:var(--brand);color:#fff;border:none;font-weight:600}
    .submit-btn:hover{background:#1d4ed8}
    .submit-btn:disabled{background:#9ca3af;color:#f3f4f6}
    .confirm-btn{background:var(--brand);color:#fff;border:none;font-weight:600}
    .confirm-btn:hover{background:#1d4ed8}
    .redo-btn{border:1px solid var(--border);background:#fff}
    .redo-btn:hover{background:#f3f4f6}

    .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0 14px}
    #stats{margin-left:12px;font-weight:600}
    .mt-2{margin-top:8px}

    details.filter-panel{width:100%;margin-bottom:10px;border:1px solid var(--border);border-radius:8px;background:#fff;overflow:hidden}
    summary.btn{border:none;border-radius:0;background:#f9fafb;width:100%;text-align:left;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center}
    summary.btn::after{content:"▼";font-size:12px;margin-left:10px}
    details[open] summary.btn::after{content:"▲"}
    .filter-content{padding:12px;border-top:1px solid var(--border)}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px}
    .filter-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none;padding:4px;border-radius:4px}
    .filter-label:hover{background:var(--hover)}
    .filter-label input{accent-color:var(--brand);margin:0}

    .question-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,.02)}
    .question-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
    .header-left{display:flex;align-items:center;gap:8px}
    .q-badge{display:inline-block;font-weight:600;font-size:14px;background:#eef2ff;color:#3730a3;border:1px solid #e0e7ff;padding:2px 8px;border-radius:999px}
    .question-text{font-size:16px;font-weight:600;margin:6px 0 8px;flex:1}
    .meta{font-size:12px;color:var(--muted);margin-top:8px}
    img{max-width:100%;height:auto;border-radius:6px;border:1px solid var(--border)}
    .img-wrap{margin:8px 0}

    /* Star Button (SVG, fixed size) */
    .star-btn{
      border:none;background:transparent;cursor:pointer;padding:4px;
      width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;
      border-radius:999px;line-height:0;
    }
    .star-btn svg{width:18px;height:18px;fill:transparent;stroke:#9ca3af;transition:transform .12s ease}
    .star-btn:hover svg{transform:scale(1.08)}
    .star-btn.starred svg{fill:#ffb400;stroke:#ffb400}

    .choices{list-style:none;padding:0;margin:8px 0}
    .choice-item{margin:6px 0}
    .choice-btn{width:100%;text-align:left;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;font-size:15px;cursor:pointer;transition:all .2s}
    .choice-btn:hover{background:#f8fafc}
    .choice-btn.selected{border-color:var(--brand);box-shadow:0 0 0 3px rgba(37,99,235,.15);background:var(--selected-bg)}
    .choice-btn.disabled{cursor:default;opacity:.8}
    .choice-btn.disabled:hover{background:#fff}

    /* Inline blanks (in question_html) */
    .qb-blank{
      display:inline-block;
      min-width:140px;
      max-width:260px;
      width:clamp(140px, 22vw, 260px);
      padding:8px 10px;
      margin:0 6px 4px 6px;
      border:1px solid var(--border);
      border-radius:8px;
      font-size:15px;
      font-weight:500;
      background:#fff;
      vertical-align:baseline;
    }
    .qb-blank:disabled{background:#f9fafb;opacity:.9}

    /* fallback fill area (if no question_html) */
    .fill-area{margin:8px 0;display:flex;flex-direction:column;gap:8px}
    .fill-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .fill-label{font-size:12px;color:var(--muted);min-width:64px}
    .fill-input{
      flex:1;min-width:240px;
      padding:10px 12px;border:1px solid var(--border);border-radius:8px;
      font-size:15px;background:#fff;
    }
    .fill-input:disabled{background:#f9fafb;opacity:.9}

    .action-bar{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    .feedback{margin-top:8px;font-weight:600;padding:8px;border-radius:6px;display:none}
    .feedback.visible{display:block}
    .correct{color:var(--success);background:#d1fae5}
    .wrong{color:var(--danger);background:#fee2e2}

    .keys-panel{
      margin-top:10px;
      padding:10px 12px;
      border:1px dashed var(--border);
      border-radius:8px;
      background:#fafafa;
      display:none;
    }
    .keys-title{font-weight:700;margin-bottom:6px}
    .keys-row{font-size:12px;color:var(--muted);margin:4px 0}
    .keys-chip{
      display:inline-block;
      padding:2px 6px;
      border-radius:999px;
      border:1px solid var(--border);
      background:#fff;
      font-size:12px;
      color:var(--ink);
      margin:2px 6px 2px 0;
    }

    code{background:#f3f4f6;border:1px solid var(--border);padding:1px 4px;border-radius:4px}
  </style>
</head>
<body>
  <h1>AMT 题库练习（选择题 + 填空题，可打乱）</h1>
  <p>先在“筛选题库”里选择要练习的范围，然后点 <strong>Randomize + Reset</strong>。答题后点击 <strong>Submit</strong> 查看结果。</p>
  <p class="meta">
    填空题判分：忽略大小写；允许多空格；也会忽略“空格有/无”的差异（例如 <code>check list</code> 与 <code>checklist</code> 视为相同）。
    填空题提交后，你可以点 <strong>Show Correct Answers</strong> 选择性显示答案。
  </p>

  <details class="filter-panel">
    <summary class="btn">筛选题库 / Filter Question Banks</summary>
    <div class="filter-content">
      <div class="filter-grid" id="filter-container"></div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-sm" onclick="toggleFilters(true)">Select All</button>
        <button class="btn btn-sm" onclick="toggleFilters(false)">Select None</button>
        <button class="btn btn-sm confirm-btn" onclick="confirmFilters()">Confirm</button>
      </div>
    </div>
  </details>

  <div class="toolbar">
    <button class="btn" id="btn-random" onclick="shuffleAndRender()">Randomize + Reset</button>
    <button class="btn" id="btn-auto"  onclick="toggleAutoSubmit()">Auto Submit: OFF</button>
    <button class="btn" id="btn-wrong" onclick="showWrongOnly()">Wrong Only (0)</button>
    <button class="btn" id="btn-star"  onclick="showStarOnly()">Star Only (0)</button>
    <button class="btn" id="btn-back"  onclick="showAll()" disabled>Back to All</button>
    <span id="stats"></span>
  </div>

  <div id="quiz"></div>

    function makeQuestionKey(q){
      const isFillQ = (q && (q.type === "fill" || Array.isArray(q.blanks)));
      const isEssayQ = (q && q.type === "essay");
      const isMultiQ = (q && Array.isArray(q.answers));
      const type = isFillQ ? "fill" : (isEssayQ ? "essay" : (isMultiQ ? "multi" : "single"));
      let key = type + "|" + normText(q && q.question);

      if(type === "fill"){
        const blanks = Array.isArray(q.blanks) ? q.blanks : [];
        const bParts = blanks.map(arr=>{
          const list = (Array.isArray(arr)?arr:[arr]).map(normText).filter(Boolean).sort();
          return list.join("/");
        });
        key += "|blanks:" + bParts.join("||");
      }else if(type === "essay"){
        // only question text
      }else{
        const choices = Array.isArray(q.choices) ? q.choices : [];

        // Order-insensitive: treat choices as a multiset (sorted bag)
        const bag = [...normChoices].sort().join("||");
        key += "|choicebag:" + bag;

        // same stem+choices but different answer keys.
        if(type === "multi"){

            .map(x=>Number(x))

          key += "|correct:" + correct;

    }

    function dedupeQuestionBank(raw){

          canon.source = mergeUnique([], srcArr);

          // merge images (keep union)
          setImageField(canon, collectImageList(q0));

          // keep one question_html if available
          if(q0.question_html) canon.question_html = q0.question_html;

          byKey.set(key, canon);
          out.push(canon);
        }else{

          canon.banks = mergeUnique(canon.banks, getBanks(q0));

          // sources
          const srcArr = Array.isArray(q0.source) ? q0.source : (q0.source ? [q0.source] : []);

          setImageField(canon, mergeUnique(collectImageList(canon), collectImageList(q0)));

        }
        if(Array.isArray(q.banks)){
          q.banks = q.banks.filter(Boolean);
        }
      });

      return { bank: out, alias };
    }

    function checkFill(q, inputs){

      if (!n) return { ok:false, detail:"No blanks defined." };
      if (!Array.isArray(inputs) || inputs.length !== n) return { ok:false, detail:"Inputs length mismatch." };

              if (!eqLoose(inputs[i], expected)) return false;
            }
          }
          return true;

        const hit = expectedList.some(ans => eqLoose(inputs[i], ans));

      }
      return { ok:true, detail:"" };
    }

    function hydrateInlineBlanks(q, st, scopeEl){
      const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
      if (!n) return;

      if (!Array.isArray(st.fillInputs) || st.fillInputs.length !== n){
        st.fillInputs = Array(n).fill("");
      }

      const blanks = Array.from(scopeEl.querySelectorAll("input.qb-blank, input[data-blank].qb-blank, input[data-blank]"));
      if (!blanks.length){
        // no inline blanks; we'll fallback to answer-area later
        return;
      }

      blanks.forEach((inp, i) => {
        // ensure class
        inp.classList.add("qb-blank");

        // map index by data-blank (1-based) if present
        let bi = i;
        const db = inp.getAttribute("data-blank");
        if (db && /^\d+$/.test(db)) bi = Math.max(0, parseInt(db,10)-1);

        if (bi >= n) return; // ignore extra inputs

        inp.value = st.fillInputs[bi] ?? "";
        inp.disabled = !!st.submitted;
        inp.placeholder = "Type…";

        inp.addEventListener("input", () => {

    function renderAnswerArea(q, st){

    function selectChoice(qId, index){

    function submitAnswer(qId){
      const q = getQ(qId);
      const st = ensureState(q);
      if(st.submitted) return;

      // 校验是否填写/选择
      if (isFill(q)) {
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        if (!n) { alert("This fill question has no blanks defined."); return; }
        if (!Array.isArray(st.fillInputs) || st.fillInputs.length !== n) { alert("Please fill all blanks!"); return; }
        for (let i=0;i<n;i++){
          if (!String(st.fillInputs[i] ?? "").trim()) { alert("Please fill all blanks!"); return; }
        }
      } else if (isEssay(q)) {

        return;
      } else {
        if (isMulti(q)) {
          if (!st.selectedSet || st.selectedSet.size === 0) { alert("Please select at least one answer!"); return; }
        } else {
          if (st.selectedIndex === null) { alert("Please select an answer first!"); return; }
        }
      }

      // 判分
      let ok=false;

      if (isFill(q)) {
        const res = checkFill(q, st.fillInputs);
        ok = !!res.ok;
      } else if (isMulti(q)) {
        const expected = q.answers.slice().sort((a,b)=>a-b);
        ok = setEqualsArray(st.selectedSet, expected);
      } else {
        ok = (st.selectedIndex === q.answer);
      }

      if(!answeredOnce.has(qId)){
        answeredOnce.add(qId);
        totalAttempts++;
        if(ok) totalCorrect++;
        else { wrongSet.add(qId); saveSet(WRONG_KEY,wrongSet); }
      }

      const fb=document.getElementById(`feedback-${qId}`);
      const html=ok ? `<div class="correct">✅ Correct!</div>` : `<div class="wrong">❌ Wrong</div>`;
      fb.innerHTML=html; fb.classList.add('visible');

      st.submitted=true; st.feedbackHTML=html;

      const submit=document.getElementById(`submit-${qId}`); submit.textContent="Submitted"; submit.disabled=true;
      document.getElementById(`redo-${qId}`).style.display='block';

      // enable keys button for fill, but do NOT auto-show
      const kb = document.getElementById(`keysbtn-${qId}`);
      if (kb) { kb.disabled = false; kb.textContent = (st.showKeys ? "Hide" : "Show") + " Correct Answers"; }

      // disable interactions
      if (isFill(q)) {
        // disable inline blanks
        const qtext = document.getElementById(`qtext-${qId}`);
        if (qtext) qtext.querySelectorAll("input.qb-blank, input[data-blank]").forEach(inp => inp.disabled = true);
        // disable fallback fill inputs
        const box = document.getElementById(`answer-${qId}`);
        if (box) box.querySelectorAll('input.fill-input').forEach(inp => inp.disabled = true);
      } else {
        document.getElementById(`answer-${qId}`).querySelectorAll('.choice-btn').forEach(b=>b.classList.add('disabled'));
      }

      updateStats();
    }

    function toggleKeys(qId){
      const q = getQ(qId);
      const st = ensureState(q);
      if (!isFill(q)) return;
      if (!st.submitted) return;

      st.showKeys = !st.showKeys;

      const panel = document.getElementById(`keys-${qId}`);
      const btn = document.getElementById(`keysbtn-${qId}`);
      if (btn) btn.textContent = (st.showKeys ? "Hide" : "Show") + " Correct Answers";

      if (!panel) return;
      panel.style.display = st.showKeys ? "block" : "none";
      if (st.showKeys) renderKeysPanel(qId);
    }

    function renderKeysPanel(qId){
      const q = getQ(qId);
      const panel = document.getElementById(`keys-${qId}`);
      if (!panel || !isFill(q)) return;

      let html = `<div class="keys-title">Correct Answers</div>`;

      // Prefer answer_sets if present (multiple combinations)
      if (Array.isArray(q.answer_sets) && q.answer_sets.length){
        html += `<div class="keys-row">Accepted answer sets (any ONE set matches):</div>`;
        q.answer_sets.forEach((set, si) => {
          const parts = (set || []).map((v, i) => {
            if (Array.isArray(v)) {
              const chips = v.map(x=>`<span class="keys-chip">${escapeAttr(x)}</span>`).join("");
              return `<div class="keys-row"><strong>Set ${si+1} · Blank ${i+1}:</strong> ${chips}</div>`;
            }
            return `<div class="keys-row"><strong>Set ${si+1} · Blank ${i+1}:</strong> <span class="keys-chip">${escapeAttr(v)}</span></div>`;
          }).join("");
          html += parts;
        });
        panel.innerHTML = html;
        return;
      }

      const blanks = Array.isArray(q.blanks) ? q.blanks : [];
      blanks.forEach((arr, i) => {
        const list = (Array.isArray(arr) ? arr : []).filter(Boolean);
        const chips = list.length
          ? list.map(x=>`<span class="keys-chip">${escapeAttr(x)}</span>`).join("")
          : `<span class="keys-chip">(no key)</span>`;
        html += `<div class="keys-row"><strong>Blank ${i+1}:</strong> ${chips}</div>`;
      });

      panel.innerHTML = html;
    }

    function redoQuestion(qId){
      const q = getQ(qId);
      const st = ensureState(q);

      st.submitted=false; st.feedbackHTML="";
      st.selectedIndex=null;
      st.selectedSet = new Set();
      st.showKeys=false;

      if (isFill(q)) {
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        st.fillInputs = Array(n).fill("");
      }

      const fb=document.getElementById(`feedback-${qId}`); fb.classList.remove('visible'); fb.innerHTML='';
      const sub=document.getElementById(`submit-${qId}`); sub.textContent='Submit Answer'; sub.disabled=false;
      document.getElementById(`redo-${qId}`).style.display='none';

      const kp = document.getElementById(`keys-${qId}`);
      if (kp) { kp.style.display = "none"; kp.innerHTML = ""; }
      const kb = document.getElementById(`keysbtn-${qId}`);
      if (kb) { kb.disabled = true; kb.textContent = "Show Correct Answers"; }

      // rerender current view to restore enabled buttons/inputs
      const snapshot = [...currentQuestions];
      render(snapshot);
    }

    function toggleStar(id){
      starred.has(id)?starred.delete(id):starred.add(id);
      saveSet(STAR_KEY,starred);
      if(viewMode==='star')render(getStarQuestions());
      else if(viewMode==='wrong')render(getWrongQuestions());
      else render(currentQuestions);
      updateButtons();
    }

    function clearCurrentSelections(){
      currentQuestions.forEach(q=>delete uiState[q.id]);
      const prev=document.getElementById("stats").textContent;
      render(viewMode==='star'?getStarQuestions():viewMode==='wrong'?getWrongQuestions():currentQuestions);
      document.getElementById("stats").textContent=prev;
    }
    const getStarQuestions=()=>QUESTION_BANK.filter(q=>starred.has(q.id));
    const getWrongQuestions=()=>QUESTION_BANK.filter(q=>wrongSet.has(q.id));

    function showStarOnly(){ if(viewMode==='all') allViewSnapshot=[...currentQuestions]; viewMode='star'; render(getStarQuestions()); updateButtons(); }
    function showWrongOnly(){ if(viewMode==='all') allViewSnapshot=[...currentQuestions]; viewMode='wrong'; render(getWrongQuestions()); updateButtons(); }
    function showAll(){ viewMode='all'; render(allViewSnapshot&&allViewSnapshot.length?allViewSnapshot:currentQuestions); allViewSnapshot=null; updateButtons(); }
    function removeFromWrong(id){ wrongSet.delete(id); saveSet(WRONG_KEY,wrongSet); render(viewMode==='wrong'?getWrongQuestions():currentQuestions); updateButtons(); }

    function updateButtons(){
      const bw=document.getElementById('btn-wrong'), bs=document.getElementById('btn-star'), bb=document.getElementById('btn-back');
      const wrongCount = QUESTION_BANK.reduce((n,q)=> n + (wrongSet.has(q.id)?1:0), 0);
      const starCount  = QUESTION_BANK.reduce((n,q)=> n + (starred.has(q.id)?1:0), 0);
      if(bw) bw.textContent=`Wrong Only (${wrongCount})`;
      if(bs) bs.textContent=`Star Only (${starCount})`;
      if(bb) bb.disabled=(viewMode==='all');
    }
    function updateStats(){
      const el=document.getElementById("stats");
      const wrongCount = QUESTION_BANK.reduce((n,q)=> n + (wrongSet.has(q.id)?1:0), 0);
      const totalNow = (currentQuestions && currentQuestions.length) ? currentQuestions.length : 0;
      if(totalAttempts===0){el.textContent=`Total:${totalNow} | No attempts yet | Wrong: ${wrongCount}`;}
      else{const acc=((totalCorrect/totalAttempts)*100).toFixed(1); el.textContent=`Total:${totalNow} | Score: ${totalCorrect}/${totalAttempts} (${acc}%) | Wrong: ${wrongCount}`;}
      updateButtons();
    }

    function updateAutoBtn(){
      const b = document.getElementById("btn-auto");
      if(!b) return;
      b.textContent = autoSubmit ? "Auto Submit: ON" : "Auto Submit: OFF";
      b.classList.toggle("confirm-btn", !!autoSubmit);
    }

    function toggleAutoSubmit(){
      autoSubmit = !autoSubmit;
      saveBool(AUTO_KEY, autoSubmit);
      updateAutoBtn();
    }

    function maybeAutoSubmit(qId){
      if(!autoSubmit) return;
      const q = getQ(qId);
      const st = ensureState(q);
      if(st.submitted) return;
      if(isEssay(q)) return;

      // Fill: auto-submit when all blanks are filled (debounced).
      if(isFill(q)){
        const n = Array.isArray(q.blanks) ? q.blanks.length : 0;
        if(!n) return;
        if(!Array.isArray(st.fillInputs) || st.fillInputs.length !== n) return;
        if(st.fillInputs.some(v=>!String(v ?? "").trim())) return;

        if(st._autoTimer) clearTimeout(st._autoTimer);
        st._autoTimer = setTimeout(() => {
          if(autoSubmit && !st.submitted) submitAnswer(qId);
        }, 350);
        return;
      }

      // Choice:
      if(isMulti(q)){
        const expected = Array.isArray(q.answers) ? q.answers.length : 0;
        if(!expected) return;
        if(!st.selectedSet || st.selectedSet.size !== expected) return;
        submitAnswer(qId);
        return;
      }

      if(st.selectedIndex === null) return;
      submitAnswer(qId);
    }


    function confirmFilters(){ shuffleAndRender(); const panel=document.querySelector('details.filter-panel'); if(panel) panel.open=false; }

    function shuffleAndRender(){
      totalAttempts=0; totalCorrect=0; wrongSet=new Set(); saveSet(WRONG_KEY,wrongSet);
      answeredOnce=new Set(); uiState={}; viewMode='all'; allViewSnapshot=null;
      const prefixes=getSelectedPrefixes();
      const subset=QUESTION_BANK.filter(q=>prefixes.some(p=> (Array.isArray(q.banks)?q.banks.includes(p):getBanks(q).includes(p)) ));
      shuffle(subset); render(subset); updateButtons();
    }

    /* ------------------ 启动 ------------------ */
    initFilters();
    sanitizeSavedSets();
    updateAutoBtn();
    shuffleAndRender();
  </script>
</body>
</html>
